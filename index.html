/* ── APP ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0fdf4}
:root{--p:#15803d;--pl:#22c55e;--p2:#166534;--g:#16a34a;--w:#d97706;--r:#dc2626;--dk:#14532d;--gr:#4b7a5a}
/* Install Banner */
.install-banner{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#14532d,#15803d);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,.2);transform:translateY(100%);transition:transform .3s}
.install-banner.show{transform:translateY(0)}
.ib-icon{font-size:26px;flex-shrink:0}.ib-text{flex:1;font-size:13px}.ib-title{font-weight:800;margin-bottom:2px}.ib-sub{opacity:.8;font-size:11px}.ib-btns{display:flex;gap:8px;flex-shrink:0}
.ib-install{background:#fff;color:#15803d;border:none;padding:7px 13px;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer}
.ib-dismiss{background:rgba(255,255,255,.2);color:#fff;border:none;padding:7px 10px;border-radius:8px;font-size:12px;cursor:pointer}
/* Screens */
.ls{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(145deg,#14532d 0%,#15803d 50%,#16a34a 100%);padding:20px 16px}
.l-logo-wrap{width:80px;height:80px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:10px;box-shadow:0 8px 24px rgba(0,0,0,.22)}
.l-title{color:#fff;font-size:27px;font-weight:900;margin-bottom:3px;letter-spacing:-.5px}
.l-title span{color:#86efac}
.l-sub{color:rgba(255,255,255,.65);font-size:12px;margin-bottom:22px;text-align:center}
.lc{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:420px;box-shadow:0 24px 48px rgba(0,0,0,.18)}
.rtabs{display:flex;background:#f0fdf4;border-radius:10px;padding:4px;margin-bottom:18px;gap:3px}
.rtab{flex:1;padding:9px 4px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;color:#4b7a5a;transition:all .18s;position:relative}
.rtab.act{background:#15803d;color:#fff;box-shadow:0 2px 6px rgba(21,128,61,.3)}
.rtab .notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:#dc2626;border-radius:50%;border:1.5px solid #fff}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;font-weight:800;color:var(--gr);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select{width:100%;padding:11px 13px;border:1.5px solid #d1fae5;border-radius:9px;font-size:14px;outline:none;transition:border-color .2s;background:#fff;color:var(--dk);-webkit-appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(21,128,61,.1)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--gr);padding:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hint{margin-top:11px;text-align:center;font-size:12px;color:#4b7a5a;background:#f0fdf4;padding:9px;border-radius:8px;line-height:1.5}
.hint-green{background:#dcfce7;border:1px solid #86efac;color:#14532d;border-radius:8px;padding:9px;font-size:12px;margin-top:10px;line-height:1.5}
.or-divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:#94a3b8;font-size:12px}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;width:100%}
.bp{background:linear-gradient(135deg,var(--p),#22c55e);color:#fff;box-shadow:0 4px 12px rgba(21,128,61,.28)}
.bp:hover{background:linear-gradient(135deg,var(--p2),var(--p))}
.bp:disabled{opacity:.5;cursor:not-allowed}
.bg{background:#16a34a;color:#fff}.br{background:#dc2626;color:#fff}.bo{background:#fff;border:2px solid var(--p);color:var(--p)}
.bgray{background:#f0fdf4;color:var(--dk);border:1.5px solid #d1fae5}
.bsm{padding:6px 12px;font-size:12px;width:auto;border-radius:8px}
.ac{min-height:100vh;display:flex;flex-direction:column}
.ah{background:linear-gradient(135deg,#14532d,#15803d);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ah-l{display:flex;align-items:center;gap:10px}
.ah-logo{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.at{font-size:16px;font-weight:900;letter-spacing:-.3px}.at span{color:#86efac}
.lbtn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 13px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700}
.tb{display:flex;background:#fff;border-bottom:2px solid #d1fae5;flex-shrink:0}
.tbb{flex:1;padding:11px 4px;border:none;background:none;color:var(--gr);font-size:11px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
.tbb.act{color:var(--p);border-bottom-color:var(--p)}
.ti{font-size:16px}
.tbb .ndot{position:absolute;top:6px;right:calc(50% - 14px);width:7px;height:7px;background:#dc2626;border-radius:50%}
.tc{flex:1;overflow-y:auto;padding:13px}
/* Map */
.mc{height:300px;border-radius:14px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.12)}
#leaflet-map{height:100%;width:100%}
/* Cards */
.card{background:#fff;border-radius:13px;padding:15px;margin-bottom:11px;box-shadow:0 2px 8px rgba(21,128,61,.07);border:1px solid #f0fdf4}
.ct{font-size:12px;font-weight:800;color:var(--dk);margin-bottom:11px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.3px}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:800}
.bg2{background:#dcfce7;color:#15803d}.br2{background:#fee2e2;color:#dc2626}.by{background:#fef9c3;color:#b45309}.bb{background:#d1fae5;color:#15803d}
/* ETA Box */
.eta-box{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:12px;padding:14px;display:flex;align-items:center;gap:14px;margin-bottom:11px}
.eta-num{font-size:36px;font-weight:900;color:#15803d;line-height:1}
.eta-label{font-size:11px;color:#4b7a5a;font-weight:600;margin-top:3px}
.eta-detail{font-size:12px;color:#14532d;margin-top:4px}
/* Active ride card */
.ride-card{border-radius:13px;padding:15px;margin-bottom:11px;border:2px solid #86efac;background:linear-gradient(135deg,#f0fdf4,#fff)}
.ride-card.pending{border-color:#d1fae5;background:#fff}
.ride-driver-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ride-drv-av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#14532d,#22c55e);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
/* Location picker */
.lpick{display:flex;gap:10px;margin-bottom:11px}
.lb2{flex:1;padding:12px 6px;border:2px solid #d1fae5;border-radius:11px;background:#fff;cursor:pointer;text-align:center;transition:all .2s}
.lb2.sel{border-color:var(--p);background:#f0fdf4;box-shadow:0 0 0 3px rgba(21,128,61,.1)}
.li{font-size:22px;display:block;margin-bottom:3px}.ll{font-size:11px;font-weight:700;color:var(--dk)}
/* Passenger */
.pax-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.pax-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f8fafc;border-radius:8px;border:1px solid #d1fae5}
.pax-row.you{background:#dcfce7;border-color:#86efac}
.pax-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#14532d,#22c55e);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0;font-weight:800}
.pax-name{font-weight:600;color:#14532d;font-size:12px}
.pax-co{font-size:11px;color:#4b7a5a}
/* Seat bar */
.seat-bar{display:flex;gap:4px;margin:8px 0 4px}
.seat{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid #d1fae5}
.seat.taken{background:#dcfce7;border-color:#86efac}.seat.you{background:#15803d;border-color:#15803d}.seat.empty{background:#f8fafc;border-color:#e2e8f0}
/* DC - driver card */
.dc{display:flex;align-items:center;gap:11px;background:#fff;border-radius:11px;padding:11px 14px;margin-bottom:8px;box-shadow:0 1px 5px rgba(0,0,0,.06)}
.dav{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#14532d,#22c55e);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.di{flex:1}.dn{font-weight:700;color:var(--dk);font-size:13px}.dv{font-size:11px;color:var(--gr);margin-top:1px}
/* Toggle */
.toggle{position:relative;display:inline-block;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.ts{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#cbd5e1;border-radius:22px;transition:.3s}
.ts:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.ts{background:var(--g)}
input:checked+.ts:before{transform:translateX(18px)}
/* Stats */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.sc{background:#fff;border-radius:13px;padding:13px;text-align:center;box-shadow:0 2px 8px rgba(21,128,61,.07);border:1px solid #d1fae5}
.sv{font-size:24px;font-weight:900;color:var(--p)}.sl{font-size:11px;color:var(--gr);margin-top:2px;font-weight:600}
/* Alerts */
.ab{padding:10px 14px;border-radius:9px;margin-bottom:10px;font-size:13px;display:flex;align-items:center;gap:8px}
.ai{background:#d1fae5;color:#14532d}.as2{background:#dcfce7;color:#166534}.aw{background:#fef3c7;color:#b45309}
/* History card */
.ride-hist{border:1.5px solid #d1fae5;border-radius:12px;overflow:hidden;margin-bottom:10px}
.ride-hist-head{padding:12px 14px;background:#f0fdf4;display:flex;align-items:center;justify-content:space-between}
.ride-hist-body{padding:10px 14px;display:flex;flex-direction:column;gap:6px}
.ride-hist-pax{display:flex;align-items:center;gap:8px;font-size:12px;color:#14532d}
/* NC */
.nc{background:#fff;border-radius:11px;padding:12px;margin-bottom:8px;border-left:4px solid var(--p);box-shadow:0 1px 5px rgba(0,0,0,.06);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.nc.park{border-left-color:#d97706}.nc.off2{border-left-color:#15803d}.nc.acc{border-left-color:#7c3aed}
.nn{font-weight:700;color:var(--dk);font-size:13px}.nd{font-size:11px;color:var(--gr);margin-top:2px}
.na{display:flex;gap:5px;flex-shrink:0}
/* Group */
.group-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:11px;padding:12px;margin-bottom:10px}
/* Admin */
.acct-row{border:1.5px solid #d1fae5;border-radius:10px;margin-bottom:8px;overflow:hidden}
.acct-main{display:flex;align-items:center;padding:10px 12px;gap:9px}
.acct-avatar{width:36px;height:36px;background:linear-gradient(135deg,#14532d,#22c55e);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.acct-info{flex:1;min-width:0}.acct-name{font-weight:700;color:#14532d;font-size:13px}.acct-meta{font-size:11px;color:#4b7a5a;margin-top:1px}
.acct-edit{background:#f0fdf4;padding:12px;border-top:1.5px solid #d1fae5}
.pending-row{border:1.5px solid #fde68a;border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fffbeb}
.pending-main{display:flex;align-items:center;padding:10px 12px;gap:9px}
.ci{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#f0fdf4;border-radius:8px;margin-bottom:6px;border:1px solid #d1fae5}
.cn{font-weight:600;color:var(--dk);font-size:13px}
.link-btn{background:none;border:none;color:var(--p);font-weight:700;cursor:pointer;font-size:13px;text-decoration:underline}
.lock-badge{display:inline-flex;align-items:center;gap:5px;background:#dcfce7;color:#15803d;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:8px}
/* Loading */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#14532d,#16a34a)}
.loading-inner{text-align:center;color:#fff}
.spin{font-size:48px;animation:sp 1.4s linear infinite;display:block;margin-bottom:12px}
@keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
/* Signup */
.signup-screen{min-height:100vh;display:flex;flex-direction:column;background:#f0fdf4}
.signup-header{background:linear-gradient(135deg,#14532d,#15803d);padding:16px;display:flex;align-items:center;gap:12px;color:#fff}
.signup-body{flex:1;padding:16px;overflow-y:auto;max-width:480px;margin:0 auto;width:100%}
.step-indicator{display:flex;align-items:center;margin-bottom:18px;gap:6px}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:2px solid #d1fae5;color:#4b7a5a;background:#fff;transition:all .3s;flex-shrink:0}
.step-dot.done{background:#15803d;border-color:#15803d;color:#fff}
.step-dot.act{background:#fff;border-color:#15803d;color:#15803d}
.step-line{flex:1;height:2px;background:#d1fae5;transition:background .3s}
.step-line.done{background:#15803d}
.success-screen{text-align:center;padding:40px 20px}
.success-icon{font-size:64px;margin-bottom:16px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f0fdf4;padding:8px 10px;text-align:left;font-weight:800;color:var(--gr);border-bottom:1px solid #d1fae5}
td{padding:8px 10px;border-bottom:1px solid #f0fdf4;color:var(--dk)}
tr:hover td{background:#f0fdf4}
.es{text-align:center;padding:30px 16px;color:var(--gr)}
.ei{font-size:40px;margin-bottom:8px}.es p{font-size:13px}
@media(max-width:400px){.tbb{font-size:10px;padding:10px 2px}.g2{grid-template-columns:1fr}}
</style>
</head>

// ── ETA ───────────────────────────────────
function getETA(driverId,pickupLoc){
  const d=ST.drivers.find(x=>x.id===driverId);
  if(!d||!d.lat||!d.lng) return null;
  const dest=pickupLoc==='park'?PARK:OFFC;
  if(d.st==='available'){
    return Math.max(1,Math.ceil(calcDist(d.lat,d.lng,dest.lat,dest.lng)/AVG_MPS/60));
  }
  if(d.st==='busy'){
    const n=ST.notifs.find(x=>x.did===driverId&&x.st==='acc');
    if(n){
      const rideDest=n.loc==='park'?OFFC:PARK;
      const d1=calcDist(d.lat,d.lng,rideDest.lat,rideDest.lng);
      const d2=calcDist(rideDest.lat,rideDest.lng,dest.lat,dest.lng);
      return Math.max(2,Math.ceil((d1+d2)/AVG_MPS/60));
    }
  }
  return null;
}
function getBestETA(pickupLoc){
  const etas=ST.drivers.filter(d=>d.online).map(d=>getETA(d.id,pickupLoc)).filter(e=>e!==null);
  return etas.length?Math.min(...etas):null;
}

// ── GPS ───────────────────────────────────
function calcDist(a,b,c,d){const R=6371000,dl=(c-a)*Math.PI/180,dn=(d-b)*Math.PI/180,x=Math.sin(dl/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dn/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function drvIcon(d){const c=d.online?(d.st==='available'?'#15803d':'#d97706'):'#94a3b8';return L.divIcon({className:'',html:`<div style="background:${c};color:#fff;border-radius:8px;padding:4px 9px;font-size:11px;font-weight:800;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25);white-space:nowrap">🚗 ${d.veh.slice(-4)}</div>`,iconSize:[72,26],iconAnchor:[36,13]});}

function startTracking(id){
  if(!navigator.geolocation)return;
  stopTracking();_lastLat=null;_lastLng=null;_lastLocTime=0;
  watchId=navigator.geolocation.watchPosition(pos=>{
    const now=Date.now(),{latitude:lat,longitude:lng}=pos.coords;
    if(now-_lastLocTime<LOC_THROTTLE)return;
    if(_lastLat!==null&&calcDist(_lastLat,_lastLng,lat,lng)<LOC_MIN_DIST)return;
    _lastLat=lat;_lastLng=lng;_lastLocTime=now;
    updateDriverLoc(id,lat,lng);
  },()=>{},{enableHighAccuracy:false,timeout:15000,maximumAge:8000});
}
function stopTracking(id){
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  if(id&&_db)set(R(_db,`gtgo/gtgo_loc/${id}`),null).catch(()=>{});
}

async function updateDriverLoc(id,lat,lng){
  const d=ST.drivers.find(x=>x.id===id);
  if(d){d.lat=lat;d.lng=lng;}
  if(_db)await set(R(_db,`gtgo/gtgo_loc/${id}`),{lat,lng});
  if(MAP&&driverMarkers[id]){driverMarkers[id].setLatLng([lat,lng]);if(d)driverMarkers[id].setIcon(drvIcon(d));}

  // Update live ETA + check for auto-complete
  const an=ST.notifs.find(n=>n.did===id&&n.st==='acc');
  if(an){
    // Update ETA in Firebase so passengers see it live
    const eta=getETA(id,an.loc);
    if(eta!==null&&eta!==an.eta){an.eta=eta;await sSet('gtgo_notifs',ST.notifs);}
    // Auto-complete: if within ARRIVAL_RADIUS of destination
    if(!_autoCompleting&&ST.driver?.id===id){
      const dest=an.loc==='park'?OFFC:PARK;
      if(calcDist(lat,lng,dest.lat,dest.lng)<ARRIVAL_RADIUS){
        await autoCompleteRide(an.id,id);
      }
    }
  }
}

async function autoCompleteRide(notifId,driverId){
  if(_autoCompleting)return;
  _autoCompleting=true;
  const n=ST.notifs.find(x=>x.id===notifId);
  if(!n){_autoCompleting=false;return;}
  const dname=ST.drivers.find(x=>x.id===driverId)?.name||'';
  ST.rides.push({id:uid(),loc:n.loc,did:driverId,dname,time:ts(),passengers:n.passengers||[],auto:true});
  ST.notifs=ST.notifs.filter(x=>x.id!==notifId);
  const d=ST.drivers.find(x=>x.id===driverId);
  if(d){d.st='available';d.trips=(d.trips||0)+1;}
  if(ST.driver?.id===driverId)ST.driver.st='available';
  await sSet('gtgo_notifs',ST.notifs);
  await sSet('gtgo_rides',ST.rides);
  await sSet('gtgo_drvs',ST.drivers);
  _autoCompleting=false;
  scheduleRender();
}

// ── REALTIME ──────────────────────────────
function setupRealtime(){
  if(!_db)return;
  const listen=(key,stKey,extra)=>onValue(R(_db,PFX+key),snap=>{const d=toArr(snap.val());if(JSON.stringify(d)!==JSON.stringify(ST[stKey])){ST[stKey]=d;if(extra)extra();scheduleRender();}});
  listen('gtgo_notifs','notifs');
  listen('gtgo_rides','rides');
  listen('gtgo_users','users',()=>{if(ST.user){const u=ST.users.find(x=>x.id===ST.user.id);if(u)ST.user=u;}});
  listen('gtgo_drvs','drivers',()=>{if(ST.driver){const d=ST.drivers.find(x=>x.id===ST.driver.id);if(d)ST.driver={...d};}});
  onValue(R(_db,'gtgo/gtgo_loc'),snap=>{
    const locs=snap.val()||{};
    Object.entries(locs).forEach(([id,loc])=>{if(!loc)return;const d=ST.drivers.find(x=>x.id===id);if(d&&(d.lat!==loc.lat||d.lng!==loc.lng)){d.lat=loc.lat;d.lng=loc.lng;if(MAP&&driverMarkers[id])driverMarkers[id].setLatLng([loc.lat,loc.lng]);}});
  });
}
function scheduleRender(){if(ST.view==='loading')return;clearTimeout(renderTimer);renderTimer=setTimeout(()=>{const onMap=(ST.view==='user'&&ST.tab==='home')||(ST.view==='driver'&&ST.tab==='map')||(ST.view==='admin'&&ST.tab==='dash');if(onMap)softUpdate();else go();},350);}
function softUpdate(){const tc=document.querySelector('.tc');if(!tc){go();return;}const tmp=document.createElement('div');tmp.innerHTML=`<div class="tc">${renderTabContent()}</div>`;const n=tmp.querySelector('.tc');if(n)tc.innerHTML=n.innerHTML;}

async function init(){

  let d=await sGet('gtgo_drvs');if(!d||!d.length){d=DEF_DRVS.map(x=>({...x}));await sSet('gtgo_drvs',d);}ST.drivers=d;
  let c=await sGet('gtgo_cos');if(!c||!c.length){c=[...DEF_COS];await sSet('gtgo_cos',c);}ST.companies=c;
  ST.notifs=(await sGet('gtgo_notifs'))||[];
  ST.rides=(await sGet('gtgo_rides'))||[];
  const sess=sessGet('gtgo_sess');
  if(sess){
    if(sess.role==='admin'){ST.view='admin';ST.tab='dash';}
    else if(sess.role==='user'&&_auth.currentUser){const usr=ST.users.find(x=>x.id===sess.id&&x.status==='active');if(usr){ST.user=usr;ST.view='user';ST.tab='home';}else sessDel('gtgo_sess');}
    else if(sess.role==='driver'&&_auth.currentUser){const drv=ST.drivers.find(x=>x.id===sess.id);if(drv){ST.driver={...drv};ST.view='driver';ST.tab='map';}else sessDel('gtgo_sess');}
    else if(sess.role!=='admin')sessDel('gtgo_sess');
  }
  if(ST.view==='loading')ST.view='login';
  go();setupRealtime();
}

async function doLogin(){
  const id=v('lid'),pwd=v('lpwd');if(!pwd)return alert('Enter your password');
  if(ST.role==='admin'){if(pwd!=='admin123')return alert('Invalid admin password');ST.view='admin';ST.tab='dash';sessSet('gtgo_sess',{role:'admin',id:'admin'});go();return;}
  try{await signInWithEmailAndPassword(_auth,FB_EMAIL(id),pwd);}catch(e){return alert('Invalid Login ID or password');}
  if(ST.role==='user'){
    const fresh=await sGet('gtgo_users');if(fresh)ST.users=fresh;
    const u=ST.users.find(x=>x.id===id);
    if(!u){await signOut(_auth);return alert('Account not found. Contact admin.');}
    if(u.status==='pending'){await signOut(_auth);return alert('⏳ Account awaiting admin approval.');}
    if(u.status==='rejected'){await signOut(_auth);return alert('❌ Account rejected. Contact admin.');}
    ST.user=u;ST.view='user';ST.tab='home';sessSet('gtgo_sess',{role:'user',id:u.id});go();
  }else{
    const fresh=await sGet('gtgo_drvs');if(fresh)ST.drivers=fresh;
    const d=ST.drivers.find(x=>x.id===id);
    if(!d){await signOut(_auth);return alert('Driver account not found.');}
    ST.driver={...d};ST.view='driver';ST.tab='map';sessSet('gtgo_sess',{role:'driver',id:d.id});go();
  }
}

      ${s===2?`<div class="card"><div class="ct">🔐 Credentials <span class="lock-badge">🔒 Firebase</span></div><div class="fg"><label>Login ID</label><input id="s-id" placeholder="e.g. john.smith"></div><div class="fg"><label>Password</label><div class="pw-wrap"><input id="s-pwd" type="${ST.showPwd?'text':'password'}" placeholder="Min. 6 characters"><button class="pw-eye" onclick="ST.showPwd=!ST.showPwd;go()">${ST.showPwd?'🙈':'👁️'}</button></div></div><div class="fg"><label>Confirm Password</label><input id="s-pwd2" type="password" placeholder="Re-enter password"></div><button class="btn bp" onclick="signupStep2()" style="margin-bottom:10px">Submit →</button><button class="btn bgray" onclick="ST.signupStep=1;go()">← Back</button></div>`:''}
      ${s===3?`<div class="success-screen"><div class="success-icon">✅</div><div style="font-size:20px;font-weight:900;color:#14532d;margin-bottom:8px">Submitted!</div><div style="font-size:14px;color:#4b7a5a;margin-bottom:20px;line-height:1.6">Pending admin approval. You can login once approved.</div><button class="btn bp" onclick="ST.view='login';ST.role='user';go()">Go to Login</button></div>`:''}

}
async function signupStep1(){const nm=v('s-nm'),co=v('s-co'),mb=v('s-mb');if(!nm)return alert('Enter your full name');if(!co)return alert('Select company');if(!mb||mb.replace(/\D/g,'').length<10)return alert('Enter valid mobile');ST._sd={name:nm,co,mob:mb};ST.signupStep=2;go();}
async function signupStep2(){
  const id=v('s-id'),pwd=v('s-pwd'),pwd2=v('s-pwd2');
  if(!id||id.includes(' '))return alert('Login ID must have no spaces');
  if(!pwd||pwd.length<6)return alert('Password min. 6 characters');
  if(pwd!==pwd2)return alert('Passwords do not match');
  const fresh=await sGet('gtgo_users');if(fresh)ST.users=fresh;
  if(ST.users.find(u=>u.id===id))return alert('Login ID already taken');
  try{await createUserWithEmailAndPassword(_auth,FB_EMAIL(id),pwd);await signOut(_auth);}catch(e){if(e.code==='auth/email-already-in-use')return alert('Login ID already registered');return alert('Error: '+e.message);}
  ST.users.push({id,name:ST._sd.name,co:ST._sd.co,mob:ST._sd.mob,status:'pending',signupTime:ts()});
  await sSet('gtgo_users',ST.users);ST.signupStep=3;go();
}
async function logout(){if(ST.driver)stopTracking(ST.driver.id);if(_auth?.currentUser)await signOut(_auth);sessDel('gtgo_sess');Object.assign(ST,{view:'login',user:null,driver:null,tab:'home',selLoc:null,editUId:null,editDId:null,showPwd:false});go();}
function setTab(t){ST.tab=t;ST.editUId=null;ST.editDId=null;go();}

function paxList(pax,myUid){return pax.map(p=>`<div class="pax-row ${p.uid===myUid?'you':''}"><div class="pax-av">${p.uname.charAt(0)}</div><div><div class="pax-name">${p.uname}${p.uid===myUid?' <span style="font-size:10px;color:#15803d">(You)</span>':''}</div><div class="pax-co">${p.co}</div></div></div>`).join('');}
function seatBar(pax,myUid){let h='<div class="seat-bar">';for(let i=0;i<MAX_SEATS;i++){const p=pax[i];h+=`<div class="seat ${!p?'empty':p.uid===myUid?'you':'taken'}">${p?'👤':'💺'}</div>`;}return h+`</div><div style="font-size:11px;color:#4b7a5a">${pax.length}/${MAX_SEATS} seats · ${MAX_SEATS-pax.length} free</div>`;}

async function createRide(){if(!ST.selLoc)return;if(!ST.drivers.filter(d=>d.online&&d.st==='available').length)return alert('No available drivers. Try again soon.');const me={uid:ST.user.id,uname:ST.user.name,co:ST.user.co,mob:ST.user.mob};ST.notifs.push({id:uid(),loc:ST.selLoc,st:'pending',did:null,time:ts(),passengers:[me]});await sSet('gtgo_notifs',ST.notifs);ST.selLoc=null;go();}
async function joinRide(nid){const n=ST.notifs.find(x=>x.id===nid);if(!n)return;if((n.passengers||[]).find(p=>p.uid===ST.user.id))return;if((n.passengers||[]).length>=MAX_SEATS)return alert('Ride is full');n.passengers.push({uid:ST.user.id,uname:ST.user.name,co:ST.user.co,mob:ST.user.mob});await sSet('gtgo_notifs',ST.notifs);ST.selLoc=null;go();}
async function leaveRide(nid){const n=ST.notifs.find(x=>x.id===nid);if(!n)return;n.passengers=(n.passengers||[]).filter(p=>p.uid!==ST.user.id);if(!n.passengers.length)ST.notifs=ST.notifs.filter(x=>x.id!==nid);await sSet('gtgo_notifs',ST.notifs);go();}

async function accReq(id){const n=ST.notifs.find(x=>x.id===id);if(!n)return;if(ST.notifs.find(x=>x.did===ST.driver.id&&x.st==='acc')){alert('Finish current pickup first!');return;}n.st='acc';n.did=ST.driver.id;const e=getETA(ST.driver.id,n.loc);if(e)n.eta=e;const d=ST.drivers.find(x=>x.id===ST.driver.id);if(d){d.st='busy';ST.driver.st='busy';}await sSet('gtgo_notifs',ST.notifs);await sSet('gtgo_drvs',ST.drivers);go();}
async function decReq(id){ST.notifs=ST.notifs.filter(n=>n.id!==id);await sSet('gtgo_notifs',ST.notifs);go();}
async function doneRide(id){const n=ST.notifs.find(x=>x.id===id);if(!n)return;ST.rides.push({id:uid(),loc:n.loc,did:ST.driver.id,dname:ST.driver.name,time:ts(),passengers:n.passengers||[]});ST.notifs=ST.notifs.filter(x=>x.id!==id);const d=ST.drivers.find(x=>x.id===ST.driver.id);if(d){d.st='available';d.trips=(d.trips||0)+1;ST.driver.st='available';}await sSet('gtgo_notifs',ST.notifs);await sSet('gtgo_rides',ST.rides);await sSet('gtgo_drvs',ST.drivers);go();}
async function toggleDrv(id){const d=ST.drivers.find(x=>x.id===id);if(!d)return;d.online=!d.online;d.st=d.online?'available':'offline';if(ST.driver?.id===id){ST.driver.online=d.online;ST.driver.st=d.st;}if(d.online)startTracking(id);else stopTracking(id);await sSet('gtgo_drvs',ST.drivers);go();}

  }
  if(ST.tab==='users'){return `${pending.length?`<div class="card" style="border:1.5px solid #fde68a;background:#fffbeb"><div class="ct" style="color:#b45309">⏳ Pending Approval (${pending.length})</div>${pending.map(u=>`<div class="pending-row"><div class="pending-main"><div style="width:36px;height:36px;background:linear-gradient(135deg,#d97706,#fbbf24);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">👤</div><div style="flex:1;min-width:0"><div style="font-weight:700;color:#92400e;font-size:13px">${u.name}</div><div style="font-size:11px;color:#b45309">ID: <b>${u.id}</b> · ${u.co}</div><div style="font-size:11px;color:#b45309">📱 ${u.mob}</div></div><div style="display:flex;gap:5px;flex-shrink:0"><button class="btn bg bsm" onclick="approveUser('${u.id}')">✓ Approve</button><button class="btn br bsm" onclick="rejectUser('${u.id}')">✕</button></div></div></div>`).join('')}</div>`:''}
    <div class="card"><div class="ct">➕ Add User <span class="lock-badge">🔒 Firebase</span></div><div class="g2"><div class="fg"><label>Login ID</label><input id="nu-id" placeholder="e.g. user03"></div><div class="fg"><label>Password</label><input id="nu-pwd" type="password" placeholder="Initial password"></div><div class="fg"><label>Full Name</label><input id="nu-nm" placeholder="Staff full name"></div><div class="fg"><label>Mobile</label><input id="nu-mb" type="tel" placeholder="Mobile"></div></div><div class="fg"><label>Company</label><select id="nu-co"><option value="">Select company</option>${ST.companies.map(c=>`<option>${c}</option>`).join('')}</select></div><button class="btn bp" onclick="addUser()">➕ Add User</button></div>
    <div class="card"><div class="ct">✅ Active Users (${active.length})</div>${active.length?active.map(u=>`<div class="acct-row"><div class="acct-main"><div class="acct-avatar">👤</div><div class="acct-info"><div class="acct-name">${u.name}</div><div class="acct-meta">ID: <b>${u.id}</b> · ${u.co}</div><div class="acct-meta">📱 ${u.mob}</div></div><div style="display:flex;gap:5px;flex-shrink:0"><button class="btn bgray bsm" onclick="ST.editUId=ST.editUId==='${u.id}'?null:'${u.id}';go()">${ST.editUId===u.id?'✕':'✏️'}</button><button class="btn br bsm" onclick="delUser('${u.id}')">🗑️</button></div></div>${ST.editUId===u.id?`<div class="acct-edit"><div class="g2" style="margin-bottom:8px"><div class="fg" style="margin:0"><label>Mobile</label><input id="eu-mb" type="tel" value="${u.mob}"></div><div class="fg" style="margin:0"><label>Company</label><select id="eu-co">${ST.companies.map(c=>`<option ${c===u.co?'selected':''}>${c}</option>`).join('')}</select></div></div><button class="btn bp bsm" onclick="saveEditU('${u.id}')">💾 Save</button></div>`:''}</div>`).join(''):'<div class="es"><div class="ei">👤</div><p>No active users</p></div>'}</div>`;}
  if(ST.tab==='drvs'){return `<div class="card"><div class="ct">➕ Add Driver <span class="lock-badge">🔒 Firebase</span></div><div class="g2"><div class="fg"><label>Login ID</label><input id="nd-id" placeholder="e.g. drv04"></div><div class="fg"><label>Password</label><input id="nd-pwd" type="password" placeholder="Initial password"></div><div class="fg"><label>Driver Name</label><input id="nd-nm" placeholder="Full name"></div><div class="fg"><label>Vehicle No.</label><input id="nd-veh" placeholder="KL-XX-XX-XXXX"></div></div><button class="btn bp" onclick="addDrv()">➕ Add Driver</button></div>
    <div class="card"><div class="ct">🚗 All Drivers (${ST.drivers.length})</div>${ST.drivers.length?ST.drivers.map(d=>`<div class="acct-row"><div class="acct-main"><div class="acct-avatar">🚗</div><div class="acct-info"><div class="acct-name">${d.name}</div><div class="acct-meta">ID: <b>${d.id}</b> · ${d.veh}</div><div class="acct-meta"><span class="badge ${d.online?'bg2':'br2'}" style="font-size:10px">${d.online?'Online':'Offline'}</span> · ${d.trips||0} trips</div></div><div style="display:flex;gap:5px;flex-shrink:0"><button class="btn bgray bsm" onclick="ST.editDId=ST.editDId==='${d.id}'?null:'${d.id}';go()">${ST.editDId===d.id?'✕':'✏️'}</button><button class="btn br bsm" onclick="delDrv('${d.id}')">🗑️</button></div></div>${ST.editDId===d.id?`<div class="acct-edit"><div class="fg" style="margin-bottom:10px"><label>Vehicle No.</label><input id="ed-veh" value="${d.veh}"></div><button class="btn bp bsm" onclick="saveEditD('${d.id}')">💾 Save</button></div>`:''}</div>`).join(''):'<div class="es"><div class="ei">🚗</div><p>No drivers yet</p></div>'}</div>`;}
  if(ST.tab==='cos'){return `<div class="card"><div class="ct">➕ Add Company</div><div style="display:flex;gap:9px"><input id="nco" placeholder="Company name" style="flex:1;padding:10px 12px;border:1.5px solid #d1fae5;border-radius:9px;font-size:14px;outline:none;color:#14532d"><button class="btn bp bsm" onclick="addCo()" style="white-space:nowrap">Add</button></div></div><div class="card"><div class="ct">🏢 Companies (${ST.companies.length})</div>${ST.companies.map((c,i)=>`<div class="ci"><span class="cn">🏢 ${c}</span><button class="btn br bsm" onclick="remCo(${i})">Remove</button></div>`).join('')}</div>`;}
  if(ST.tab==='rides'){
    return `<div class="card"><div class="ct">📋 Ride History (${ST.rides.length})</div>
      ${ST.rides.length?ST.rides.slice().reverse().map(r=>{const pax=r.passengers||[];return`
      <div class="ride-hist">
        <div class="ride-hist-head">
          <div>
            <div style="font-weight:800;color:#14532d;font-size:13px">${r.loc==='park'?'🅿️ Parking → Office':'🏢 Office → Parking'}</div>
            <div style="font-size:11px;color:#4b7a5a;margin-top:2px">🚗 ${r.dname} · 🕐 ${r.time}${r.auto?' · Auto':''}
          </div>
          </div>
          <span class="badge bg2">👥 ${pax.length}</span>
        </div>
        <div class="ride-hist-body">
          ${pax.map(p=>`<div class="ride-hist-pax"><div class="pax-av" style="width:26px;height:26px;font-size:11px">${p.uname.charAt(0)}</div><div style="flex:1;font-weight:600">${p.uname}</div><div style="font-size:11px;color:#4b7a5a">${p.co}</div></div>`).join('')}
        </div>
      </div>`;}).join(''):'<div class="es"><div class="ei">📋</div><p>No rides yet</p></div>'}
    </div>`;
  }
  return '';
}

// ── ADMIN ACTIONS ─────────────────────────
async function approveUser(uid){const u=ST.users.find(x=>x.id===uid);if(u)u.status='active';await sSet('gtgo_users',ST.users);go();}
async function rejectUser(uid){ST.users=ST.users.filter(x=>x.id!==uid);await sSet('gtgo_users',ST.users);go();}
async function addUser(){const id=v('nu-id'),pwd=v('nu-pwd'),nm=v('nu-nm'),mb=v('nu-mb'),co=v('nu-co');if(!id||!pwd||!nm||!mb||!co)return alert('Fill all fields');if(ST.users.find(u=>u.id===id))return alert('Login ID exists');try{await createUserWithEmailAndPassword(_auth2,FB_EMAIL(id),pwd);await signOut(_auth2);}catch(e){if(e.code==='auth/email-already-in-use')return alert('Login ID already registered');return alert('Firebase error: '+e.message);}ST.users.push({id,name:nm,co,mob:mb,status:'active'});await sSet('gtgo_users',ST.users);go();}
async function saveEditU(uid){const u=ST.users.find(x=>x.id===uid);if(!u)return;const mb=v('eu-mb'),co=v('eu-co');if(mb)u.mob=mb;if(co)u.co=co;ST.editUId=null;await sSet('gtgo_users',ST.users);go();}
async function delUser(uid){ST.users=ST.users.filter(u=>u.id!==uid);await sSet('gtgo_users',ST.users);go();}
async function addDrv(){const id=v('nd-id'),pwd=v('nd-pwd'),nm=v('nd-nm'),veh=v('nd-veh');if(!id||!pwd||!nm||!veh)return alert('Fill all fields');if(ST.drivers.find(d=>d.id===id))return alert('Login ID exists');try{await createUserWithEmailAndPassword(_auth2,FB_EMAIL(id),pwd);await signOut(_auth2);}catch(e){if(e.code==='auth/email-already-in-use')return alert('Login ID already registered');return alert('Firebase error: '+e.message);}ST.drivers.push({id,name:nm,veh,online:false,st:'offline',lat:10.005+Math.random()*.01,lng:76.363+Math.random()*.01,trips:0});await sSet('gtgo_drvs',ST.drivers);go();}
async function saveEditD(did){const d=ST.drivers.find(x=>x.id===did);if(!d)return;const veh=v('ed-veh');if(veh)d.veh=veh;ST.editDId=null;await sSet('gtgo_drvs',ST.drivers);go();}
async function delDrv(did){ST.drivers=ST.drivers.filter(d=>d.id!==did);await sSet('gtgo_drvs',ST.drivers);go();}
async function addCo(){const val=(document.getElementById('nco')?.value||'').trim();if(!val)return alert('Enter company name');if(ST.companies.includes(val))return alert('Already exists');ST.companies.push(val);await sSet('gtgo_cos',ST.companies);go();}
async function remCo(i){ST.companies.splice(i,1);await sSet('gtgo_cos',ST.companies);go();}

function hdr(title,sub){return `<div class="ah"><div class="ah-l"><div class="ah-logo">🌿</div><div><div class="at">Greentouch <span>Go</span></div><div style="font-size:10px;color:rgba(255,255,255,.6);margin-top:1px">${title}${sub?' · '+sub:''}</div></div></div><button class="lbtn" onclick="logout()">Logout</button></div>`;}

Object.assign(window,{ST,go,setTab,logout,doLogin,goSignup,signupStep1,signupStep2,createRide,joinRide,leaveRide,accReq,decReq,doneRide,toggleDrv,approveUser,rejectUser,addUser,saveEditU,delUser,addDrv,saveEditD,delDrv,addCo,remCo,doInstall,dismissInstall});
init();
</script>
