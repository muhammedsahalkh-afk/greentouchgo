/* ── APP ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;min-height:-webkit-fill-available}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0fdf4}
:root{--p:#15803d;--pl:#22c55e;--p2:#166534;--g:#16a34a;--w:#d97706;--r:#dc2626;--dk:#14532d;--gr:#4b7a5a}
/* Install Banner */
.install-banner{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#14532d,#15803d);
  color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:9999;
  box-shadow:0 -4px 20px rgba(0,0,0,.2);transform:translateY(100%);transition:transform .3s ease}
.install-banner.show{transform:translateY(0)}
.install-banner .ib-icon{font-size:28px;flex-shrink:0}
.install-banner .ib-text{flex:1;font-size:13px}
.install-banner .ib-title{font-weight:800;margin-bottom:2px}
.install-banner .ib-sub{opacity:.8;font-size:11px}
.install-banner .ib-btns{display:flex;gap:8px;flex-shrink:0}
.ib-install{background:#fff;color:#15803d;border:none;padding:8px 14px;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer}
.ib-dismiss{background:rgba(255,255,255,.2);color:#fff;border:none;padding:8px 10px;border-radius:8px;font-size:12px;cursor:pointer}
/* Screens */
.ls{min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:linear-gradient(145deg,#14532d 0%,#15803d 50%,#16a34a 100%);padding:20px 16px}
.l-logo-wrap{width:80px;height:80px;background:#fff;border-radius:50%;display:flex;align-items:center;
  justify-content:center;margin-bottom:10px;box-shadow:0 8px 24px rgba(0,0,0,.22)}
.l-title{color:#fff;font-size:27px;font-weight:900;margin-bottom:3px;letter-spacing:-.5px}
.l-title span{color:#86efac}
.l-sub{color:rgba(255,255,255,.65);font-size:12px;margin-bottom:22px;text-align:center}
.lc{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:420px;box-shadow:0 24px 48px rgba(0,0,0,.18)}
.rtabs{display:flex;background:#f0fdf4;border-radius:10px;padding:4px;margin-bottom:18px;gap:3px}
.rtab{flex:1;padding:9px 4px;border:none;background:transparent;border-radius:8px;cursor:pointer;
  font-size:12px;font-weight:700;color:#4b7a5a;transition:all .18s;position:relative}
.rtab.act{background:#15803d;color:#fff;box-shadow:0 2px 6px rgba(21,128,61,.3)}
.rtab .notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:#dc2626;border-radius:50%;border:1.5px solid #fff}
/* Forms */
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;font-weight:800;color:var(--gr);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select{width:100%;padding:11px 13px;border:1.5px solid #d1fae5;border-radius:9px;
  font-size:14px;outline:none;transition:border-color .2s;background:#fff;color:var(--dk);
  -webkit-appearance:none;appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(21,128,61,.1)}
.fg .pw-wrap{position:relative}
.fg .pw-wrap input{padding-right:44px}
.fg .pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--gr);padding:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hint{margin-top:11px;text-align:center;font-size:12px;color:#4b7a5a;background:#f0fdf4;padding:9px;border-radius:8px;line-height:1.5}
.link-btn{background:none;border:none;color:var(--p);font-weight:700;cursor:pointer;font-size:13px;text-decoration:underline}
/* Divider */
.or-divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:#94a3b8;font-size:12px}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:none;
  border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;width:100%}
.bp{background:linear-gradient(135deg,var(--p),#22c55e);color:#fff;box-shadow:0 4px 12px rgba(21,128,61,.28)}
.bp:hover{background:linear-gradient(135deg,var(--p2),var(--p))}
.bp:disabled{opacity:.5;cursor:not-allowed}
.bg{background:#16a34a;color:#fff}.bg:hover{background:#15803d}
.br{background:#dc2626;color:#fff}.br:hover{background:#b91c1c}
.bw{background:#d97706;color:#fff}
.bo{background:#fff;border:2px solid var(--p);color:var(--p)}
.bgray{background:#f0fdf4;color:var(--dk);border:1.5px solid #d1fae5}
.bsm{padding:6px 12px;font-size:12px;width:auto;border-radius:8px}
/* App shell */
.ac{min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column}
.ah{background:linear-gradient(135deg,#14532d,#15803d);color:#fff;padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  padding-top:max(13px,env(safe-area-inset-top))}
.ah-l{display:flex;align-items:center;gap:10px}
.ah-logo{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.at{font-size:16px;font-weight:900;letter-spacing:-.3px}.at span{color:#86efac}
.lbtn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 13px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700}
/* Tabs */
.tb{display:flex;background:#fff;border-bottom:2px solid #d1fae5;flex-shrink:0}
.tbb{flex:1;padding:11px 4px;border:none;background:none;color:var(--gr);font-size:11px;font-weight:700;
  cursor:pointer;border-bottom:3px solid transparent;transition:all .18s;display:flex;flex-direction:column;
  align-items:center;gap:2px;position:relative}
.tbb.act{color:var(--p);border-bottom-color:var(--p)}
.ti{font-size:16px}
.tbb .ndot{position:absolute;top:6px;right:calc(50% - 14px);width:7px;height:7px;background:#dc2626;border-radius:50%}
.tc{flex:1;overflow-y:auto;padding:13px;padding-bottom:calc(13px + env(safe-area-inset-bottom))}
/* Map */
.mc{height:350px;border-radius:12px;overflow:hidden}
#leaflet-map{height:100%;width:100%}
/* Cards */
.card{background:#fff;border-radius:13px;padding:15px;margin-bottom:11px;
  box-shadow:0 2px 8px rgba(21,128,61,.07);border:1px solid #f0fdf4}
.ct{font-size:12px;font-weight:800;color:var(--dk);margin-bottom:11px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.3px}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:800}
.bg2{background:#dcfce7;color:#15803d}.br2{background:#fee2e2;color:#dc2626}
.by{background:#fef9c3;color:#b45309}.bb{background:#d1fae5;color:#15803d}
.bpurple{background:#f3e8ff;color:#7c3aed}.borange{background:#fff7ed;color:#c2410c}
/* Notification cards */
.nc{background:#fff;border-radius:11px;padding:12px;margin-bottom:8px;border-left:4px solid var(--p);
  box-shadow:0 1px 5px rgba(0,0,0,.06);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.nc.park{border-left-color:#d97706}.nc.off2{border-left-color:#15803d}.nc.acc{border-left-color:#7c3aed}.nc.pend{border-left-color:#f59e0b}
.nn{font-weight:700;color:var(--dk);font-size:13px}.nd{font-size:11px;color:var(--gr);margin-top:2px}
.na{display:flex;gap:5px;flex-shrink:0}
/* Driver / account cards */
.dc{display:flex;align-items:center;gap:11px;background:#fff;border-radius:11px;padding:11px 14px;margin-bottom:8px;box-shadow:0 1px 5px rgba(0,0,0,.06)}
.dav{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#14532d,#22c55e);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.di{flex:1}.dn{font-weight:700;color:var(--dk);font-size:13px}.dv{font-size:11px;color:var(--gr);margin-top:1px}
.toggle{position:relative;display:inline-block;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.ts{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#cbd5e1;border-radius:22px;transition:.3s}
.ts:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.ts{background:var(--g)}
input:checked+.ts:before{transform:translateX(18px)}
/* Location picker */
.lpick{display:flex;gap:10px;margin-bottom:13px}
.lb2{flex:1;padding:12px 6px;border:2px solid #d1fae5;border-radius:11px;background:#fff;cursor:pointer;text-align:center;transition:all .2s}
.lb2.sel{border-color:var(--p);background:#f0fdf4;box-shadow:0 0 0 3px rgba(21,128,61,.1)}
.li{font-size:22px;display:block;margin-bottom:3px}.ll{font-size:11px;font-weight:700;color:var(--dk)}
/* Stats */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.sc{background:#fff;border-radius:13px;padding:13px;text-align:center;box-shadow:0 2px 8px rgba(21,128,61,.07);border:1px solid #d1fae5}
.sv{font-size:24px;font-weight:900;color:var(--p)}.sl{font-size:11px;color:var(--gr);margin-top:2px;font-weight:600}
/* Alerts */
.ab{padding:10px 14px;border-radius:9px;margin-bottom:10px;font-size:13px;display:flex;align-items:center;gap:8px}
.ai{background:#d1fae5;color:#14532d}.as2{background:#dcfce7;color:#166534}.aw{background:#fef3c7;color:#b45309}
.aok{background:#f0fdf4;border:1px solid #86efac;color:#14532d}
/* Empty */
.es{text-align:center;padding:30px 16px;color:var(--gr)}
.ei{font-size:40px;margin-bottom:8px}.es p{font-size:13px}
/* Table */
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f0fdf4;padding:8px 10px;text-align:left;font-weight:800;color:var(--gr);border-bottom:1px solid #d1fae5}
td{padding:8px 10px;border-bottom:1px solid #f0fdf4;color:var(--dk)}
tr:hover td{background:#f0fdf4}
/* Account rows */
.acct-row{border:1.5px solid #d1fae5;border-radius:10px;margin-bottom:8px;overflow:hidden}
.acct-main{display:flex;align-items:center;padding:10px 12px;gap:9px}
.acct-avatar{width:36px;height:36px;background:linear-gradient(135deg,#14532d,#22c55e);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.acct-info{flex:1;min-width:0}
.acct-name{font-weight:700;color:#14532d;font-size:13px}
.acct-meta{font-size:11px;color:#4b7a5a;margin-top:1px}
.acct-edit{background:#f0fdf4;padding:12px;border-top:1.5px solid #d1fae5}
/* Pending signup row */
.pending-row{border:1.5px solid #fde68a;border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fffbeb}
.pending-main{display:flex;align-items:center;padding:10px 12px;gap:9px}
/* Company */
.ci{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#f0fdf4;border-radius:8px;margin-bottom:6px;border:1px solid #d1fae5}
.cn{font-weight:600;color:var(--dk);font-size:13px}
/* Loading */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#14532d,#16a34a)}
.loading-inner{text-align:center;color:#fff}
.spin{font-size:48px;animation:sp 1.4s linear infinite;display:block;margin-bottom:12px}
@keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
/* Signup specific */
.signup-screen{min-height:100vh;display:flex;flex-direction:column;background:#f0fdf4}
.signup-header{background:linear-gradient(135deg,#14532d,#15803d);padding:16px;display:flex;align-items:center;gap:12px;color:#fff}
.signup-body{flex:1;padding:16px;overflow-y:auto;max-width:480px;margin:0 auto;width:100%}
.step-indicator{display:flex;align-items:center;margin-bottom:18px;gap:6px}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:2px solid #d1fae5;color:#4b7a5a;background:#fff;transition:all .3s}
.step-dot.done{background:#15803d;border-color:#15803d;color:#fff}
.step-dot.act{background:#fff;border-color:#15803d;color:#15803d}
.step-line{flex:1;height:2px;background:#d1fae5;transition:background .3s}
.step-line.done{background:#15803d}
/* Success */
.success-screen{text-align:center;padding:40px 20px}
.success-icon{font-size:64px;margin-bottom:16px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
@media(max-width:400px){.tbb{font-size:10px;padding:10px 2px}.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen"><div class="loading-inner"><span class="spin">🌿</span><div style="font-size:18px;font-weight:800">Greentouch Go</div><div style="font-size:12px;opacity:.7;margin-top:4px">Starting up...</div></div></div>
</div>
<div class="install-banner" id="installBanner">
  <div class="ib-icon">🌿</div>
  <div class="ib-text">
    <div class="ib-title">Install Greentouch Go</div>
    <div class="ib-sub">Add to home screen for quick access</div>
  </div>
  <div class="ib-btns">
    <button class="ib-install" onclick="doInstall()">Install</button>
    <button class="ib-dismiss" onclick="dismissInstall()">✕</button>
  </div>
</div>
<script>

async function sSet(k,v){try{await window.storage.set(k,JSON.stringify(v));}catch(e){}}
async function sDel(k){try{await window.storage.delete(k);}catch(e){}}

// ── DEFAULTS ─────────────────────────────

  {id:'drv02',pwd:'drv123',name:'Suresh Nair',veh:'KL-07-CD-5678',online:false,st:'offline',lat:10.0058,lng:76.3637,trips:8},
  {id:'drv03',pwd:'drv123',name:'Pradeep Menon',veh:'KL-07-EF-9012',online:false,st:'offline',lat:10.0071,lng:76.3656,trips:15},

// ── STATE ─────────────────────────────────
const ST={
  view:'loading',role:'user',
  users:[],drivers:[],companies:[],

  user:null,driver:null,
  tab:'map',selLoc:null,
  editUId:null,editDId:null,

};
const PARK={lat:10.003944,lng:76.361403};

let MAP=null, installEvt=null;

function ts(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}
function uid(){return 'x'+Date.now()+Math.floor(Math.random()*999)}
function v(id){return(document.getElementById(id)?.value||'').trim()}

// ── PWA SETUP ─────────────────────────────
function setupPWA(){
  // Manifest
  const iconSVG=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2315803d'/><text y='.9em' font-size='80' x='10'>🌿</text></svg>`;
  const iconURL=`data:image/svg+xml,${iconSVG}`;
  const mf={name:'Greentouch Go',short_name:'Greentouch Go',description:'Office Cab Service · Smart City, Kakkanad',start_url:'.',display:'standalone',orientation:'portrait-primary',background_color:'#14532d',theme_color:'#15803d',icons:[{src:iconURL,sizes:'192x192',type:'image/svg+xml'},{src:iconURL,sizes:'512x512',type:'image/svg+xml',purpose:'maskable'}]};
  try{const mb=new Blob([JSON.stringify(mf)],{type:'application/manifest+json'});const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(mb);document.head.appendChild(ml);}catch(e){}

  // Apple touch icon
  try{const al=document.createElement('link');al.rel='apple-touch-icon';al.href=iconURL;document.head.appendChild(al);}catch(e){}

  // Service Worker
  try{
    const sw=`const C='gtgo-v2';self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>clients.claim()))});self.addEventListener('fetch',e=>{const u=e.request.url;if(u.includes('openstreetmap')||u.includes('cdnjs')){e.respondWith(caches.open(C).then(c=>c.match(e.request).then(r=>r||(fetch(e.request).then(resp=>{c.put(e.request,resp.clone());return resp})))));}});`;
    const sb=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker?.register(URL.createObjectURL(sb),{scope:'./'}).catch(()=>{});
  }catch(e){}

  // Install prompt
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();installEvt=e;
    setTimeout(()=>document.getElementById('installBanner')?.classList.add('show'),3000);
  });
  window.addEventListener('appinstalled',()=>dismissInstall());

  // iOS install hint
  const isIOS=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone=window.matchMedia('(display-mode:standalone)').matches;
  if(isIOS&&!isStandalone){
    setTimeout(()=>{
      const b=document.getElementById('installBanner');
      if(b){b.querySelector('.ib-sub').textContent='Tap Share → "Add to Home Screen"';b.querySelector('.ib-install').textContent='How?';b.querySelector('.ib-install').onclick=()=>{alert('Tap the Share button (📤) in Safari, then tap "Add to Home Screen"');};b.classList.add('show');}
    },3000);
  }
}

function doInstall(){if(installEvt){installEvt.prompt();installEvt.userChoice.then(()=>dismissInstall());}}
function dismissInstall(){document.getElementById('installBanner')?.classList.remove('show');}

// ── INIT ──────────────────────────────────
async function init(){
  setupPWA();
  let u=await sGet('gtgo_users');
  if(!u){u=DEF_USERS.map(x=>({...x}));await sSet('gtgo_users',u);}
  ST.users=u;
  let d=await sGet('gtgo_drvs');
  if(!d){d=DEF_DRVS.map(x=>({...x}));await sSet('gtgo_drvs',d);}
  ST.drivers=d;
  let c=await sGet('gtgo_cos');
  if(!c){c=[...DEF_COS];await sSet('gtgo_cos',c);}
  ST.companies=c;

  const sess=await sGet('gtgo_sess');
  if(sess){
    if(sess.role==='user'){
      const usr=ST.users.find(x=>x.id===sess.id&&x.status==='active');
      if(usr){ST.user=usr;ST.view='user';ST.tab='map';}
    }else if(sess.role==='driver'){
      const drv=ST.drivers.find(x=>x.id===sess.id);
      if(drv){ST.driver={...drv};ST.view='driver';ST.tab='map';}
    }else if(sess.role==='admin'){ST.view='admin';ST.tab='dash';}
  }
  if(ST.view==='loading') ST.view='login';
  go();
}

function go(){
  document.getElementById('app').innerHTML=render();
  if(MAP){MAP.remove();MAP=null;}
  setTimeout(initMap,90);
}
function render(){
  if(ST.view==='login') return rLogin();
  if(ST.view==='signup') return rSignup();
  if(ST.view==='user') return rUser();
  if(ST.view==='driver') return rDriver();
  if(ST.view==='admin') return rAdmin();
  return '';
}

// ── MAP ───────────────────────────────────
function initMap(){
  const el=document.getElementById('leaflet-map');
  if(!el) return;
  if(MAP){MAP.remove();MAP=null;}
  MAP=L.map('leaflet-map').setView([10.0069,76.3647],14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(MAP);
  const mk=(e,bg)=>L.divIcon({className:'',html:`<div style="background:${bg};color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:17px;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">${e}</div>`,iconSize:[36,36],iconAnchor:[18,18]});
  L.marker([PARK.lat,PARK.lng],{icon:mk('🅿️','#d97706')}).addTo(MAP).bindPopup('<b>🅿️ Parking Ground</b><br>Smart City, Kakkanad');
  L.marker([OFFC.lat,OFFC.lng],{icon:mk('🏢','#15803d')}).addTo(MAP).bindPopup('<b>🏢 Greentouch Spaces</b><br>Smart City, Kakkanad');
  L.polyline([[PARK.lat,PARK.lng],[OFFC.lat,OFFC.lng]],{color:'#22c55e',weight:4,opacity:.6,dashArray:'8,6'}).addTo(MAP);
  ST.drivers.forEach(d=>{
    const c=d.online?(d.st==='available'?'#15803d':'#d97706'):'#94a3b8';
    const ic=L.divIcon({className:'',html:`<div style="background:${c};color:#fff;border-radius:7px;padding:4px 8px;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.22);white-space:nowrap">🚗 ${d.veh.slice(-4)}</div>`,iconSize:[68,24],iconAnchor:[34,12]});
    L.marker([d.lat,d.lng],{icon:ic}).addTo(MAP).bindPopup(`<b>${d.name}</b><br>${d.veh}<br>${d.st}`);
  });
  if(ST.view==='driver'&&ST.driver){
    const d=ST.drivers.find(x=>x.id===ST.driver.id);
    if(d) MAP.setView([d.lat,d.lng],15);
  }
}

  </div>`;
}

async function doLogin(){
  const id=v('lid'), pwd=v('lpwd');
  if(!pwd) return alert('Enter your password');
  if(ST.role==='user'){
    if(!id) return alert('Enter your Login ID');
    const u=ST.users.find(x=>x.id===id&&x.pwd===pwd);
    if(!u) return alert('Invalid Login ID or password');
    if(u.status==='pending') return alert('⏳ Your account is awaiting admin approval.\nPlease try again after approval.');
    if(u.status==='rejected') return alert('❌ Your account request was rejected.\nContact admin for assistance.');
    ST.user=u;ST.view='user';ST.tab='map';
    await sSet('gtgo_sess',{role:'user',id:u.id});go();
  }else if(ST.role==='driver'){
    if(!id) return alert('Enter your Login ID');
    const d=ST.drivers.find(x=>x.id===id&&x.pwd===pwd);
    if(!d) return alert('Invalid Login ID or password');
    ST.driver={...d};ST.view='driver';ST.tab='map';
    await sSet('gtgo_sess',{role:'driver',id:d.id});go();
  }else{
    if(pwd!=='admin123') return alert('Invalid admin password');
    ST.view='admin';ST.tab='dash';
    await sSet('gtgo_sess',{role:'admin',id:'admin'});go();
  }
}
function goSignup(){ST.view='signup';ST.signupStep=1;go();}

// Temp signup data stored across steps
function signupStep1(){
  const nm=v('s-nm'),co=v('s-co'),mb=v('s-mb');
  if(!nm) return alert('Enter your full name');
  if(!co) return alert('Select your company');
  if(!mb||mb.replace(/\D/g,'').length<10) return alert('Enter a valid mobile number');
  ST._signupData={name:nm,co,mob:mb};
  ST.signupStep=2;go();
}
async function signupStep2(){
  const id=v('s-id'),pwd=v('s-pwd'),pwd2=v('s-pwd2');
  if(!id||id.includes(' ')) return alert('Enter a valid Login ID (no spaces)');
  if(ST.users.find(u=>u.id===id)) return alert('This Login ID is already taken. Try another.');
  if(!pwd||pwd.length<6) return alert('Password must be at least 6 characters');
  if(pwd!==pwd2) return alert('Passwords do not match');
  const newUser={id,pwd,name:ST._signupData.name,co:ST._signupData.co,mob:ST._signupData.mob,status:'pending',signupTime:ts()};
  ST.users.push(newUser);
  await sSet('gtgo_users',ST.users);
  ST._signupData={...ST._signupData,id};
  ST.signupStep=3;go();
}

async function logout(){
  await sDel('gtgo_sess');
  Object.assign(ST,{view:'login',user:null,driver:null,tab:'map',selLoc:null,editUId:null,editDId:null,showPwd:false});
  go();
}
function setTab(t){ST.tab=t;ST.editUId=null;ST.editDId=null;go();}

function sendNotif(){
  if(!ST.selLoc) return;
  if(!ST.drivers.filter(d=>d.online&&d.st==='available').length) return alert('No available drivers. Please try again soon.');

  ST.selLoc=null;go();
}
function cancelReq(id){ST.notifs=ST.notifs.filter(n=>n.id!==id);go();}

        </div>
      </div></div>
    <div class="sg">
      <div class="sc"><div class="sv">${me.trips}</div><div class="sl">Total Trips</div></div>
      <div class="sc"><div class="sv">${todT}</div><div class="sl">Today's Trips</div></div>
    </div>
    <div class="card" style="background:${me.online?'#f0fdf4':'#f8fafc'};border:1px solid ${me.online?'#bbf7d0':'#e2e8f0'}">
      <span style="font-size:13px;color:${me.online?'#14532d':'#64748b'}">
        ${me.online?'🟢 You are <b>online</b> — receiving requests':'🔴 You are <b>offline</b>'}
      </span>
    </div>`;
  }
  return `<div class="ac">${hdr(`🚗 ${me.name}`,me.veh)}
    <div class="tb">${tabs.map(([t,i,l])=>`<button class="tbb ${ST.tab===t?'act':''}" onclick="setTab('${t}')"><span class="ti">${i}</span>${l}</button>`).join('')}</div>
    <div class="tc">${body}</div></div>`;
}
function accReq(id){
  const n=ST.notifs.find(x=>x.id===id);if(!n) return;
  if(ST.notifs.find(x=>x.did===ST.driver.id&&x.st==='acc')){alert('Finish current pickup first!');return;}
  n.st='acc';n.did=ST.driver.id;
  const d=ST.drivers.find(x=>x.id===ST.driver.id);
  if(d){d.st='busy';ST.driver.st='busy';}go();
}
function decReq(id){ST.notifs=ST.notifs.filter(n=>n.id!==id);go();}
function doneRide(id){
  const n=ST.notifs.find(x=>x.id===id);if(!n) return;
  ST.rides.push({id:uid(),uid:n.uid,uname:n.uname,co:n.co,loc:n.loc,did:ST.driver.id,dname:ST.driver.name,time:ts()});
  ST.notifs=ST.notifs.filter(x=>x.id!==id);
  const d=ST.drivers.find(x=>x.id===ST.driver.id);
  if(d){d.st='available';d.trips++;ST.driver.st='available';}go();
}
async function toggleDrv(id){
  const d=ST.drivers.find(x=>x.id===id);if(!d) return;
  d.online=!d.online;d.st=d.online?'available':'offline';
  if(ST.driver?.id===id){ST.driver.online=d.online;ST.driver.st=d.st;}
  await sSet('gtgo_drvs',ST.drivers);go();
}

// ── ADMIN VIEW ────────────────────────────
function rAdmin(){
  const pending=ST.users.filter(u=>u.status==='pending');
  const active=ST.users.filter(u=>u.status==='active');
  const pend=ST.notifs.filter(n=>n.st==='pending').length;
  const tabs=[['dash','📊','Dash'],['users','👤',`Users${pending.length?` (${pending.length})`:''}`],['drvs','🚗','Drivers'],['cos','🏢','Companies'],['rides','📋','Rides']];

  if(ST.tab==='dash'){
    const activeR=ST.notifs.filter(n=>n.st!=='done');

      <div class="sc"><div class="sv">${active.length}</div><div class="sl">Users</div></div>

      <div class="sc"><div class="sv" style="color:#d97706">${pend}</div><div class="sl">Pending</div></div>

    </div>
    ${pending.length?`<div class="ab aw">⚠️ <b>${pending.length} new signup${pending.length>1?'s':''}</b> awaiting your approval — <button class="link-btn" onclick="setTab('users')">Review now →</button></div>`:''}
    <div class="card" style="padding:9px"><div class="ct">🗺️ Live Fleet Map</div><div class="mc"><div id="leaflet-map"></div></div></div>
    ${activeR.length?`<div class="card"><div class="ct">⚠️ Active Requests</div>

        <div><div class="nn">${n.uname} <span class="badge bb">${n.co}</span></div>
        <div class="nd">${n.loc==='park'?'🅿️ Parking':'🏢 Office'} · ${n.time}</div></div>
        <span class="badge ${n.st==='acc'?'bg2':'by'}">${n.st==='acc'?'Accepted':'Pending'}</span>
      </div>`).join('')}</div>`:''}`;
  }

  if(ST.tab==='users'){
    body=`
    <!-- Pending Signups -->
    ${pending.length?`<div class="card" style="border:1.5px solid #fde68a;background:#fffbeb">
      <div class="ct" style="color:#b45309">⏳ Pending Approval (${pending.length})</div>
      ${pending.map(u=>`<div class="pending-row">
        <div class="pending-main">
          <div style="width:36px;height:36px;background:linear-gradient(135deg,#d97706,#fbbf24);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">👤</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;color:#92400e;font-size:13px">${u.name}</div>
            <div style="font-size:11px;color:#b45309">ID: <b>${u.id}</b> · ${u.co}</div>
            <div style="font-size:11px;color:#b45309">📱 ${u.mob} · Signed up ${u.signupTime||'recently'}</div>
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0">
            <button class="btn bg bsm" onclick="approveUser('${u.id}')">✓ Approve</button>
            <button class="btn br bsm" onclick="rejectUser('${u.id}')">✕ Reject</button>
          </div>
        </div>
      </div>`).join('')}
    </div>`:''}

    <!-- Add User -->
    <div class="card"><div class="ct">➕ Add User Account</div>
      <div class="g2">
        <div class="fg"><label>Login ID</label><input id="nu-id" placeholder="e.g. user03"></div>
        <div class="fg"><label>Password</label><input id="nu-pwd" type="password" placeholder="Set password"></div>
        <div class="fg"><label>Full Name</label><input id="nu-nm" placeholder="Staff full name"></div>
        <div class="fg"><label>Mobile</label><input id="nu-mb" type="tel" placeholder="Mobile number"></div>
      </div>
      <div class="fg"><label>Company</label>
        <select id="nu-co"><option value="">Select company</option>${ST.companies.map(c=>`<option>${c}</option>`).join('')}</select>
      </div>
      <button class="btn bp" onclick="addUser()">➕ Add User</button>
    </div>

    <!-- Active Users -->
    <div class="card"><div class="ct">✅ Active Users (${active.length})</div>
      ${active.length?active.map(u=>`<div class="acct-row">
        <div class="acct-main">
          <div class="acct-avatar">👤</div>
          <div class="acct-info">
            <div class="acct-name">${u.name}</div>
            <div class="acct-meta">ID: <b>${u.id}</b> · ${u.co}</div>
            <div class="acct-meta">📱 ${u.mob}</div>
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0">
            <button class="btn bgray bsm" onclick="ST.editUId=ST.editUId==='${u.id}'?null:'${u.id}';go()">${ST.editUId===u.id?'✕':'✏️ Edit'}</button>
            <button class="btn br bsm" onclick="delUser('${u.id}')">🗑️</button>
          </div>
        </div>
        ${ST.editUId===u.id?`<div class="acct-edit">
          <div class="g2" style="margin-bottom:8px">
            <div class="fg" style="margin:0"><label>New Password</label><input id="eu-pwd" type="password" placeholder="Leave blank to keep"></div>
            <div class="fg" style="margin:0"><label>Mobile</label><input id="eu-mb" type="tel" value="${u.mob}"></div>
          </div>
          <div class="fg" style="margin-bottom:10px"><label>Company</label>
            <select id="eu-co">${ST.companies.map(c=>`<option ${c===u.co?'selected':''}>${c}</option>`).join('')}</select>
          </div>
          <button class="btn bp bsm" onclick="saveEditU('${u.id}')">💾 Save</button>
        </div>`:''}
      </div>`).join(''):'<div class="es"><div class="ei">👤</div><p>No active users yet</p></div>'}
    </div>`;
  }

  if(ST.tab==='drvs'){
    body=`<div class="card"><div class="ct">➕ Add Driver Account</div>
      <div class="g2">
        <div class="fg"><label>Login ID</label><input id="nd-id" placeholder="e.g. drv04"></div>
        <div class="fg"><label>Password</label><input id="nd-pwd" type="password" placeholder="Set password"></div>
        <div class="fg"><label>Driver Name</label><input id="nd-nm" placeholder="Full name"></div>
        <div class="fg"><label>Vehicle No.</label><input id="nd-veh" placeholder="KL-XX-XX-XXXX"></div>
      </div>
      <button class="btn bp" onclick="addDrv()">➕ Add Driver</button>
    </div>
    <div class="card"><div class="ct">🚗 All Drivers (${ST.drivers.length})</div>
      ${ST.drivers.length?ST.drivers.map(d=>`<div class="acct-row">
        <div class="acct-main">
          <div class="acct-avatar">🚗</div>
          <div class="acct-info">
            <div class="acct-name">${d.name}</div>
            <div class="acct-meta">ID: <b>${d.id}</b> · ${d.veh}</div>
            <div class="acct-meta"><span class="badge ${d.online?'bg2':'br2'}" style="font-size:10px">${d.online?'Online':'Offline'}</span> · ${d.trips} trips</div>
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0">
            <button class="btn bgray bsm" onclick="ST.editDId=ST.editDId==='${d.id}'?null:'${d.id}';go()">${ST.editDId===d.id?'✕':'✏️ Edit'}</button>
            <button class="btn br bsm" onclick="delDrv('${d.id}')">🗑️</button>
          </div>
        </div>
        ${ST.editDId===d.id?`<div class="acct-edit">
          <div class="g2" style="margin-bottom:10px">
            <div class="fg" style="margin:0"><label>New Password</label><input id="ed-pwd" type="password" placeholder="Leave blank to keep"></div>
            <div class="fg" style="margin:0"><label>Vehicle No.</label><input id="ed-veh" value="${d.veh}"></div>
          </div>
          <button class="btn bp bsm" onclick="saveEditD('${d.id}')">💾 Save</button>
        </div>`:''}
      </div>`).join(''):'<div class="es"><div class="ei">🚗</div><p>No drivers yet</p></div>'}
    </div>`;
  }

  if(ST.tab==='cos'){
    body=`<div class="card"><div class="ct">➕ Add Company</div>
      <div style="display:flex;gap:9px">
        <input id="nco" placeholder="Company name" style="flex:1;padding:10px 12px;border:1.5px solid #d1fae5;border-radius:9px;font-size:14px;outline:none;color:#14532d">
        <button class="btn bp bsm" onclick="addCo()" style="white-space:nowrap">Add</button>
      </div>
    </div>
    <div class="card"><div class="ct">🏢 Companies (${ST.companies.length})</div>
      ${ST.companies.map((c,i)=>`<div class="ci"><span class="cn">🏢 ${c}</span><button class="btn br bsm" onclick="remCo(${i})">Remove</button></div>`).join('')}
    </div>`;
  }

  if(ST.tab==='rides'){
    body=`<div class="card"><div class="ct">📋 Ride History (${ST.rides.length})</div>
      ${ST.rides.length?`<div style="overflow-x:auto"><table>
        <thead><tr><th>Staff</th><th>Company</th><th>Pickup</th><th>Driver</th><th>Time</th></tr></thead>
        <tbody>${ST.rides.map(r=>`<tr><td>${r.uname}</td><td>${r.co}</td>
          <td>${r.loc==='park'?'🅿️ Parking':'🏢 Office'}</td><td>${r.dname}</td><td>${r.time}</td>
        </tr>`).join('')}</tbody></table></div>`
      :'<div class="es"><div class="ei">📋</div><p>No rides yet</p></div>'}
    </div>`;

  return `<div class="ac">${hdr('🛡️ Admin','Management Panel')}
    <div class="tb">${tabs.map(([t,i,l])=>`<button class="tbb ${ST.tab===t?'act':''}" onclick="setTab('${t}')">
      <span class="ti">${i}</span>${l}${t==='users'&&pending.length?`<span class="ndot"></span>`:''}
    </button>`).join('')}</div>
    <div class="tc">${body}</div></div>`;

// ── ADMIN ACTIONS ─────────────────────────
async function approveUser(uid){
  const u=ST.users.find(x=>x.id===uid);
  if(u){u.status='active';}
  await sSet('gtgo_users',ST.users);go();
}
async function rejectUser(uid){
  ST.users=ST.users.filter(x=>x.id!==uid);
  await sSet('gtgo_users',ST.users);go();
}
async function addUser(){
  const id=v('nu-id'),pwd=v('nu-pwd'),nm=v('nu-nm'),mb=v('nu-mb'),co=v('nu-co');
  if(!id||!pwd||!nm||!mb||!co) return alert('Fill all fields');
  if(ST.users.find(u=>u.id===id)) return alert('Login ID already exists');
  ST.users.push({id,pwd,name:nm,co,mob:mb,status:'active'});
  await sSet('gtgo_users',ST.users);go();
}
async function saveEditU(uid){
  const u=ST.users.find(x=>x.id===uid);if(!u) return;
  const pwd=v('eu-pwd'),mb=v('eu-mb'),co=v('eu-co');
  if(pwd) u.pwd=pwd;if(mb) u.mob=mb;if(co) u.co=co;
  ST.editUId=null;await sSet('gtgo_users',ST.users);go();
}
async function delUser(uid){
  ST.users=ST.users.filter(u=>u.id!==uid);
  await sSet('gtgo_users',ST.users);go();
}
async function addDrv(){
  const id=v('nd-id'),pwd=v('nd-pwd'),nm=v('nd-nm'),veh=v('nd-veh');
  if(!id||!pwd||!nm||!veh) return alert('Fill all fields');
  if(ST.drivers.find(d=>d.id===id)) return alert('Login ID already exists');
  ST.drivers.push({id,pwd,name:nm,veh,online:false,st:'offline',lat:10.005+Math.random()*.01,lng:76.363+Math.random()*.01,trips:0});
  await sSet('gtgo_drvs',ST.drivers);go();
}
async function saveEditD(did){
  const d=ST.drivers.find(x=>x.id===did);if(!d) return;
  const pwd=v('ed-pwd'),veh=v('ed-veh');
  if(pwd) d.pwd=pwd;if(veh) d.veh=veh;
  ST.editDId=null;await sSet('gtgo_drvs',ST.drivers);go();
}
async function delDrv(did){
  ST.drivers=ST.drivers.filter(d=>d.id!==did);
  await sSet('gtgo_drvs',ST.drivers);go();
}
async function addCo(){
  const val=(document.getElementById('nco')?.value||'').trim();
  if(!val) return alert('Enter a company name');
  if(ST.companies.includes(val)) return alert('Already exists');
  ST.companies.push(val);await sSet('gtgo_cos',ST.companies);go();
}
async function remCo(i){ST.companies.splice(i,1);await sSet('gtgo_cos',ST.companies);go();}

// ── HEADER ────────────────────────────────
function hdr(title,sub){
  return `<div class="ah">
    <div class="ah-l">
      <div class="ah-logo">🌿</div>
      <div><div class="at">Greentouch <span>Go</span></div>
      <div style="font-size:10px;color:rgba(255,255,255,.6);margin-top:1px">${title}${sub?' · '+sub:''}</div></div>
    </div>
    <button class="lbtn" onclick="logout()">Logout</button>
  </div>`;
}

init();
</script>
</body>
