<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref as R, get, set, remove, onValue }
                           from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

// ── CONFIG ────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCcCDcoAQi2vf0SPVUU283mwLN6vHbBHwY",
  authDomain: "greentouch-go.firebaseapp.com",
  databaseURL: "https://greentouch-go-default-rtdb.firebaseio.com",
  projectId: "greentouch-go",
  storageBucket: "greentouch-go.firebasestorage.app",
  messagingSenderId: "54837107303",
  appId: "1:54837107303:web:bc36efc222ad22696092c2",
  measurementId: "G-4FP48EHRDV"
};
const MAX_SEATS = 6; // max passengers per ride (7-seater cab, 1 = driver)

// ── FIREBASE ──────────────────────────────
let _db = null;
const PFX = 'gtgo/';

function initFirebase() {
  try { const app=initializeApp(FIREBASE_CONFIG); _db=getDatabase(app); return true; }
  catch(e) {
    document.getElementById('app').innerHTML=`<div class="cfg-err"><div class="cfg-card"><h2>⚠️ Firebase Error</h2><p>${e.message}</p></div></div>`;
    return false;
  }
}
function toArr(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val.filter(Boolean);
  if (typeof val==='object') return Object.values(val).filter(Boolean);
  return [];
}
async function sGet(k) {
  if (!_db) return null;
  try {
    const snap=await get(R(_db,PFX+k)); if(!snap.exists()) return null;
    const val=snap.val();
    if (val&&typeof val==='object'&&!Array.isArray(val)) { const ks=Object.keys(val); if(ks.length&&ks.every(ki=>!isNaN(parseInt(ki)))) return Object.values(val); }
    return val;
  } catch(e) { return null; }
}

// ── GPS HELPERS ───────────────────────────
function calcDist(a,b,c,d){const R=6371000,dLat=(c-a)*Math.PI/180,dLng=(d-b)*Math.PI/180,x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function drvIcon(d){const c=d.online?(d.st==='available'?'#15803d':'#d97706'):'#94a3b8';return L.divIcon({className:'',html:`<div style="background:${c};color:#fff;border-radius:7px;padding:4px 8px;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.22);white-space:nowrap">🚗 ${d.veh.slice(-4)}</div>`,iconSize:[68,24],iconAnchor:[34,12]});}
function startTracking(id){
  if(!navigator.geolocation){alert('GPS not available on this device');return;}
  stopTracking(); _lastLat=null;_lastLng=null;_lastLocTime=0;
  watchId=navigator.geolocation.watchPosition(pos=>{
    const now=Date.now(),{latitude:lat,longitude:lng}=pos.coords;
    if(now-_lastLocTime<LOC_THROTTLE) return;
    if(_lastLat!==null&&calcDist(_lastLat,_lastLng,lat,lng)<LOC_MIN_DIST) return;
    _lastLat=lat;_lastLng=lng;_lastLocTime=now; updateDriverLoc(id,lat,lng);
  },()=>{},{enableHighAccuracy:false,timeout:15000,maximumAge:8000});
}
function stopTracking(id){
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  if(id&&_db) set(R(_db,`gtgo/gtgo_loc/${id}`),null).catch(()=>{});
}
async function updateDriverLoc(id,lat,lng){
  const d=ST.drivers.find(x=>x.id===id); if(d){d.lat=lat;d.lng=lng;}
  if(_db) await set(R(_db,`gtgo/gtgo_loc/${id}`),{lat,lng});
  if(MAP&&driverMarkers[id]){driverMarkers[id].setLatLng([lat,lng]);if(d)driverMarkers[id].setIcon(drvIcon(d));}
}

function setupRealtime() {
  if (!_db) return;
  const listen=(key,stKey,extra)=>onValue(R(_db,PFX+key),snap=>{
    const d=toArr(snap.val());
    if(JSON.stringify(d)!==JSON.stringify(ST[stKey])){
      ST[stKey]=d; if(extra) extra(d); scheduleRender();
    }
  });
  listen('gtgo_notifs','notifs');
  listen('gtgo_rides','rides');
  listen('gtgo_users','users',()=>{if(ST.user){const u=ST.users.find(x=>x.id===ST.user.id);if(u)ST.user=u;}});
  listen('gtgo_drvs','drivers',()=>{if(ST.driver){const d=ST.drivers.find(x=>x.id===ST.driver.id);if(d)ST.driver={...d};}});
  onValue(R(_db,'gtgo/gtgo_loc'),snap=>{
    const locs=snap.val()||{};
    Object.entries(locs).forEach(([id,loc])=>{
      if(!loc) return;
      const d=ST.drivers.find(x=>x.id===id);
      if(d&&(d.lat!==loc.lat||d.lng!==loc.lng)){d.lat=loc.lat;d.lng=loc.lng;if(MAP&&driverMarkers[id])driverMarkers[id].setLatLng([loc.lat,loc.lng]);}
    });
  });
}

  try{const sw=`const C='gtgo-v3';self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>{if(e.request.url.includes('openstreetmap')||e.request.url.includes('cdnjs'))e.respondWith(caches.open(C).then(c=>c.match(e.request).then(r=>r||(fetch(e.request).then(res=>{c.put(e.request,res.clone());return res})))));});`;navigator.serviceWorker?.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'./'}).catch(()=>{});}catch(e){}
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installEvt=e;setTimeout(()=>document.getElementById('installBanner')?.classList.add('show'),3000);});

// Notify actions
async function createRide(){
  if(!ST.selLoc) return;
  if(!ST.drivers.filter(d=>d.online&&d.st==='available').length) return alert('No available drivers. Try again soon.');
  const me={uid:ST.user.id,uname:ST.user.name,co:ST.user.co,mob:ST.user.mob};
  ST.notifs.push({id:uid(),loc:ST.selLoc,st:'pending',did:null,time:ts(),passengers:[me]});
  await sSet('gtgo_notifs',ST.notifs);ST.selLoc=null;go();
}
async function joinRide(notifId){
  const n=ST.notifs.find(x=>x.id===notifId);if(!n) return;
  if((n.passengers||[]).find(p=>p.uid===ST.user.id)) return alert('You are already in this ride');
  if((n.passengers||[]).length>=MAX_SEATS) return alert('This ride is full');
  n.passengers.push({uid:ST.user.id,uname:ST.user.name,co:ST.user.co,mob:ST.user.mob});
  await sSet('gtgo_notifs',ST.notifs);ST.selLoc=null;go();
}
async function leaveRide(notifId){
  const n=ST.notifs.find(x=>x.id===notifId);if(!n) return;
  n.passengers=(n.passengers||[]).filter(p=>p.uid!==ST.user.id);
  if(!n.passengers.length) ST.notifs=ST.notifs.filter(x=>x.id!==notifId);
  await sSet('gtgo_notifs',ST.notifs);go();
}

async function accReq(id){
  const n=ST.notifs.find(x=>x.id===id);if(!n) return;
  if(ST.notifs.find(x=>x.did===ST.driver.id&&x.st==='acc')){alert('Finish current pickup first!');return;}
  n.st='acc';n.did=ST.driver.id;
  const d=ST.drivers.find(x=>x.id===ST.driver.id);if(d){d.st='busy';ST.driver.st='busy';}
  await sSet('gtgo_notifs',ST.notifs);await sSet('gtgo_drvs',ST.drivers);go();
}
async function decReq(id){ST.notifs=ST.notifs.filter(n=>n.id!==id);await sSet('gtgo_notifs',ST.notifs);go();}
async function doneRide(id){
  const n=ST.notifs.find(x=>x.id===id);if(!n) return;
  const pax=n.passengers||[];
  // Single ride record with all passengers
  ST.rides.push({id:uid(),loc:n.loc,did:ST.driver.id,dname:ST.driver.name,time:ts(),passengers:pax});
  ST.notifs=ST.notifs.filter(x=>x.id!==id);
  const d=ST.drivers.find(x=>x.id===ST.driver.id);if(d){d.st='available';d.trips=(d.trips||0)+1;ST.driver.st='available';}
  await sSet('gtgo_notifs',ST.notifs);await sSet('gtgo_rides',ST.rides);await sSet('gtgo_drvs',ST.drivers);go();
}
async function toggleDrv(id){
  const d=ST.drivers.find(x=>x.id===id);if(!d) return;
  d.online=!d.online;d.st=d.online?'available':'offline';
  if(ST.driver?.id===id){ST.driver.online=d.online;ST.driver.st=d.st;}
  if(d.online) startTracking(id); else stopTracking(id);
  await sSet('gtgo_drvs',ST.drivers);go();
}

        <div style="font-size:12px;color:#4b7a5a">${pax.map(p=>`${p.uname} (${p.co})`).join(' · ')}</div>
      </div>`}).join(''):'<div class="es"><div class="ei">📋</div><p>No rides yet</p></div>'}
    </div>`;
  }
  return '';
}

// ── ADMIN ACTIONS ─────────────────────────
async function approveUser(uid){const u=ST.users.find(x=>x.id===uid);if(u)u.status='active';await sSet('gtgo_users',ST.users);go();}
async function rejectUser(uid){ST.users=ST.users.filter(x=>x.id!==uid);await sSet('gtgo_users',ST.users);go();}
async function addUser(){
  const id=v('nu-id'),pwd=v('nu-pwd'),nm=v('nu-nm'),mb=v('nu-mb'),co=v('nu-co');
  if(!id||!pwd||!nm||!mb||!co) return alert('Fill all fields');
  if(ST.users.find(u=>u.id===id)) return alert('Login ID already exists');
  ST.users.push({id,pwd,name:nm,co,mob:mb,status:'active'});await sSet('gtgo_users',ST.users);go();
}
async function saveEditU(uid){
  const u=ST.users.find(x=>x.id===uid);if(!u) return;
  const pwd=v('eu-pwd'),mb=v('eu-mb'),co=v('eu-co');
  if(pwd)u.pwd=pwd;if(mb)u.mob=mb;if(co)u.co=co;
  ST.editUId=null;await sSet('gtgo_users',ST.users);go();
}
async function delUser(uid){ST.users=ST.users.filter(u=>u.id!==uid);await sSet('gtgo_users',ST.users);go();}
async function addDrv(){
  const id=v('nd-id'),pwd=v('nd-pwd'),nm=v('nd-nm'),veh=v('nd-veh');
  if(!id||!pwd||!nm||!veh) return alert('Fill all fields');
  if(ST.drivers.find(d=>d.id===id)) return alert('Login ID already exists');
  ST.drivers.push({id,pwd,name:nm,veh,online:false,st:'offline',lat:10.005+Math.random()*.01,lng:76.363+Math.random()*.01,trips:0});
  await sSet('gtgo_drvs',ST.drivers);go();
}
async function saveEditD(did){
  const d=ST.drivers.find(x=>x.id===did);if(!d) return;
  const pwd=v('ed-pwd'),veh=v('ed-veh');
  if(pwd)d.pwd=pwd;if(veh)d.veh=veh;
  ST.editDId=null;await sSet('gtgo_drvs',ST.drivers);go();
}
async function delDrv(did){ST.drivers=ST.drivers.filter(d=>d.id!==did);await sSet('gtgo_drvs',ST.drivers);go();}
async function addCo(){const val=(document.getElementById('nco')?.value||'').trim();if(!val)return alert('Enter a company name');if(ST.companies.includes(val))return alert('Already exists');ST.companies.push(val);await sSet('gtgo_cos',ST.companies);go();}
async function remCo(i){ST.companies.splice(i,1);await sSet('gtgo_cos',ST.companies);go();}

function hdr(title,sub){return `<div class="ah"><div class="ah-l"><div class="ah-logo">🌿</div><div><div class="at">Greentouch <span>Go</span></div><div style="font-size:10px;color:rgba(255,255,255,.6);margin-top:1px">${title}${sub?' · '+sub:''}</div></div></div><button class="lbtn" onclick="logout()">Logout</button></div>`;}

// ── EXPOSE TO WINDOW ──────────────────────
Object.assign(window,{
  ST,go,setTab,logout,doLogin,goSignup,signupStep1,signupStep2,
  createRide,joinRide,leaveRide,
  accReq,decReq,doneRide,toggleDrv,
  approveUser,rejectUser,addUser,saveEditU,delUser,
  addDrv,saveEditD,delDrv,addCo,remCo,
  doInstall,dismissInstall
});

init();
</script>
